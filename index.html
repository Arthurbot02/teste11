<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escolha uma Música 🎵</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Primeiro escolha uma música</h1>

      <div class="music-grid">
        <!-- Música 1 -->
        <div class="music-card">
          <img src="jem.jpeg" alt="Duas Metades" />
          <h3>Duas Metades</h3>
          <a href="https://open.spotify.com/" target="_blank">
            Ouvir no Spotify
          </a>
        </div>

        <!-- Música 2 -->
        <div class="music-card">
          <img src="bk.jpeg" alt="Planos" />
          <h3>Planos</h3>
          <a href="https://open.spotify.com/" target="_blank">
            Ouvir no Spotify
          </a>
        </div>

        <!-- Música 3 -->
        <div class="music-card">
          <img src="beth.jpeg" alt="Água de chuva no mar" />
          <h3>Água de chuva no mar</h3>
          <a href="https://open.spotify.com/" target="_blank">
            Ouvir no Spotify
          </a>
        </div>

        <!-- Música 4 -->
        <div class="music-card">
          <img src="emicida.jpeg" alt="Alma gêmea" />
          <h3>Alma gêmea</h3>
          <a href="https://open.spotify.com/" target="_blank">
            Ouvir no Spotify
          </a>
        </div>
      </div>

      <!-- Botão Continuar -->
      <button id="continuarBtn">Continuar ❤️</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
